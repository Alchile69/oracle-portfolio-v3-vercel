<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Oracle Portfolio V3.0 - Secteurs d'Activité</title>
    <meta name="description" content="Oracle Portfolio V3.0 - Analyse avancée des secteurs d'activité économique avec graphiques interactifs, classification A-F et recommandations d'optimisation." />
    <meta name="keywords" content="oracle portfolio, secteurs activité, investissement, analyse sectorielle, graphiques interactifs, ROI" />
    <meta name="author" content="Manus AI" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Oracle Portfolio V3.0 - Secteurs d'Activité" />
    <meta property="og:description" content="Évolution V2.5 → V3.0 avec 11 secteurs d'activité, graphiques interactifs et auto-amélioration (ROI 1,464%+)" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oracle-portfolio-v3-vercel.vercel.app" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oracle Portfolio V3.0 - Secteurs d'Activité" />
    <meta name="twitter:description" content="Analyse sectorielle avancée avec 11 secteurs, graphiques interactifs et ROI documenté de 1,464%+" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#3b82f6" />
    
    <style>
      /* Critical CSS pour éviter le FOUC */
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9fafb;
        color: #111827;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #111827;
          color: #f9fafb;
        }
        
        .loading-screen {
          background-color: #111827;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div>
        <div class="loading-spinner"></div>
        <p style="margin-top: 16px; color: #6b7280; font-size: 14px;">
          Chargement d'Oracle Portfolio V3.0...
        </p>
      </div>
    </div>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- Remove loading screen when React app loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.3s ease-out';
            setTimeout(function() {
              loadingScreen.remove();
            }, 300);
          }
        }, 500);
      });
    </script>
    
    <!-- Vite Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
